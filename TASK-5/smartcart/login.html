<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | SmartCart</title>
  <link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/responsive.css"><link rel="stylesheet" href="css/animations.css">
</head>
<body>
  <header class="navbar"><div class="container nav-inner"><a class="brand" href="index.html"><img class="brand-logo" src="assets/logo.svg" alt="SmartCart logo"><span>SmartCart</span></a><nav class="nav-links"><a href="index.html">Home</a><a href="products.html">Products</a><a href="signup.html">Signup</a></nav><div class="nav-actions"><button class="icon-btn" data-theme-toggle title="Toggle theme">&#9680;</button><a class="icon-btn" href="cart.html" title="Cart">&#128722;<span class="cart-count" data-cart-count>0</span></a><button class="icon-btn hamburger" data-nav-toggle title="Menu">&#9776;</button></div></div></header>
  <main><div class="container auth-layout">
    <div class="auth-card"><span class="eyebrow">Welcome back</span><h1>Login to SmartCart</h1><p class="muted">Use the PHP handler for sessions and password verification.</p>
      <form class="auth-form" action="php/login.php" method="POST" data-auth-form>

        <input class="field" name="password" type="password" placeholder="Password" required>
        <button class="btn" type="submit">Login</button>
        <a class="form-note" href="#" data-forgot>Forgot password?</a>
        <p class="form-note">New here? <a href="signup.html">Create an account</a></p>
      </form>
    </div>
    <div class="auth-art glass"></div>
  </div></main>
  <script src="js/api.js"></script><script src="js/app.js"></script><script src="js/cart.js"></script><script src="js/auth.js"></script><script src="js/animations.js"></script>
</body>
</html>
