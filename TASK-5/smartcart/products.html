<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products | SmartCart</title>
  <link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/responsive.css"><link rel="stylesheet" href="css/animations.css">
</head>
<body>
  <header class="navbar"><div class="container nav-inner"><a class="brand" href="index.html"><img class="brand-logo" src="assets/logo.svg" alt="SmartCart logo"><span>SmartCart</span></a><nav class="nav-links"><a href="index.html">Home</a><a class="active" href="products.html">Products</a><a href="about.html">About</a><a href="contact.html">Contact</a></nav><div class="nav-actions"><button class="icon-btn" data-theme-toggle title="Toggle theme">&#9680;</button><a class="icon-btn" href="cart.html" title="Cart">&#128722;<span class="cart-count" data-cart-count>0</span></a><a class="btn small" href="login.html">Login</a><button class="icon-btn hamburger" data-nav-toggle title="Menu">&#9776;</button></div></div></header>
  <main>
    <section class="page-hero"><div class="container"><span class="eyebrow reveal">Smart catalog</span><h1 class="reveal">Browse premium products</h1><p class="reveal">Search, filter, sort, quick view, wishlist, and add products to a persistent shopping cart.</p></div></section>
    <section class="section-tight"><div class="container">
      <div class="filter-bar glass" style="padding:16px">
        <input class="field" data-search placeholder="Search products or categories">
        <select class="select" data-category><option>all</option></select>
        <select class="select" data-sort><option value="popular">Popularity</option><option value="ratings">Ratings</option><option value="low">Price low to high</option><option value="high">Price high to low</option></select>
        <select class="select" data-price><option value="9999">Any price</option><option value="5000">Under ₹5,000</option><option value="15000">Under ₹15,000</option><option value="50000">Under ₹50,000</option></select>
      </div>
      <div class="product-grid" data-products-grid></div>
    </div></section>
  </main>
  <footer class="footer"><div class="container"><p>&copy; 2026 SmartCart. Built for a professional internship showcase.</p></div></footer>
  <button class="icon-btn back-top" data-back-top>&uarr;</button><div class="modal" data-modal></div>
  <script src="js/api.js"></script><script src="js/app.js"></script><script src="js/cart.js"></script><script src="js/products.js"></script><script src="js/animations.js"></script>
</body>
</html>
